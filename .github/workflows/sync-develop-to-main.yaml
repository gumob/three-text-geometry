name: Sync develop to main

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists"
            exit 0
          fi
          gh pr create \
            --base main \
            --head develop \
            --title "chore: sync develop to main" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated PR to sync develop branch into main for release.

          ---
          🤖 Generated by the sync-develop-to-main workflow
          EOF
          )"
